// ===== Normalisierung & Match-Logik =====
const normalize = (s) => (s || "")
  .toString()
  .toLowerCase()
  .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")
  .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
  .replace(/[^a-z0-9]/g, "");

const normalizeNumber = (s) => (s || "").toString().replace(/['\s.,]/g, "").replace(/CHF/gi, "").trim();

const accountMatchers = {
  forderungen: { contains: ["forderung", "debitor", "kundenguthaben"], excludes: ["wertberichtigung", "delkredere", "wbforderung", "wbford", "verbindlichkeit", "kreditor", "verlust", "anzahlung", "abschreibung"] },
  wbforderungen: { contains: ["wertberichtigung", "delkredere", "wbforderung", "wbfll", "wbford"], excludes: [] },
  verbindlichkeiten: { contains: ["verbindlichkeit", "kreditor"], excludes: ["forderung", "debitor"] },
  bank: { contains: ["bank"], excludes: [] },
  postfinance: { contains: ["post"], excludes: [] },
  kasse: { contains: ["kass", "bargeld"], excludes: [] },
  betriebsertrag: { contains: ["betriebsertrag", "warenertrag", "umsatz", "verkaufserloes", "warenverkauf", "ertraglieferung", "nettoerloes"], excludes: ["aufwand", "minderung"] },
  warenaufwand: { contains: ["warenaufwand", "einstandspreis", "materialaufwand", "aufwandlieferung"], excludes: ["ertrag"] },
  verlusteausforderungen: { contains: ["verlust", "forderungsverlust", "debitorenverlust", "abschreibungforderung"], excludes: ["wertberichtigung", "delkredere"] },
  aoertrag: { contains: ["ausserordentlich", "aussordentlich", "aoertrag", "periodenfremd"], excludes: ["aufwand"] },
  skontoertrag: { contains: ["skonto"], excludes: ["verkauf", "kunden", "minderung"] },
  maschinen: { contains: ["maschine", "sachanlage", "anlagevermoegen"], excludes: [] },
  anzahlungenlieferanten: { contains: ["anzahlunganlieferant", "anzahlunglieferant", "anzahlungenanlieferanten", "anzahlungenlieferanten", "geleisteteanzahlung", "anzahlungmaschine", "anzahlungenmaschinen"], excludes: ["kunden", "erhalten"] },
  anzahlungenkunden: { contains: ["anzahlungkunde", "anzahlungenkunden", "erhalteneanzahlung", "anzahlungenvonkunden"], excludes: ["lieferant", "geleistet", "maschine"] },
  privat: { contains: ["privat"], excludes: ["aufwand", "ertrag"] },
  erfolgsrechnung: { contains: ["erfolg", "gewinnundverlust"], excludes: [] },
  erloesminderungen: { contains: ["erloesminderung", "rabatt", "kundenskonto", "verkaufsskonto", "skontiverkauf"], excludes: [] },
};

const matchAccount = (input, key) => {
  const n = normalize(input);
  if (!n) return false;
  const m = accountMatchers[key];
  if (!m) return false;
  if (!m.contains.some(c => n.includes(c))) return false;
  return !m.excludes.some(e => n.includes(e));
};

const checkEntry = (entry, correctOptions) => {
  if (!entry.soll || !entry.haben || !entry.betrag) return false;
  return correctOptions.some((opt) => {
    const sollMatch = opt.sollKeys.some((k) => matchAccount(entry.soll, k));
    const habenMatch = opt.habenKeys.some((k) => matchAccount(entry.haben, k));
    const betragMatch = normalizeNumber(entry.betrag) === normalizeNumber(opt.betrag.toString());
    return sollMatch && habenMatch && betragMatch;
  });
};

const diagnoseEntry = (entry, correctOptions) => {
  if (!entry.soll && !entry.haben && !entry.betrag) return { sollOk: false, habenOk: false, betragOk: false };
  let bestMatch = { sollOk: false, habenOk: false, betragOk: false, score: -1 };
  for (const opt of correctOptions) {
    const sollOk = opt.sollKeys.some((k) => matchAccount(entry.soll, k));
    const habenOk = opt.habenKeys.some((k) => matchAccount(entry.haben, k));
    const betragOk = normalizeNumber(entry.betrag) === normalizeNumber(opt.betrag.toString());
    const score = (sollOk?1:0) + (habenOk?1:0) + (betragOk?1:0);
    if (score > bestMatch.score) bestMatch = { sollOk, habenOk, betragOk, score };
  }
  return bestMatch;
};

const BookingRow = ({ entry, onChange, locked, status, diagnose }) => {
  const baseColor = status === "correct" ? "border-emerald-500 bg-emerald-50" : status === "wrong" ? "border-rose-400 bg-rose-50" : "border-stone-300 bg-white";
  const fieldColor = (ok) => status === "wrong" ? (ok ? "border-emerald-400" : "border-rose-400 bg-rose-100/50") : "border-stone-300";
  return (
    <div className={`grid grid-cols-12 gap-2 p-2 rounded-md border ${baseColor} transition-colors`}>
      <input type="text" placeholder="Soll-Konto" className={`col-span-5 px-3 py-2 bg-transparent border-b ${diagnose ? fieldColor(diagnose.sollOk) : "border-stone-300"} focus:border-[#1B6B63] text-sm`} value={entry.soll} onChange={(e) => onChange({ ...entry, soll: e.target.value })} disabled={locked} />
      <input type="text" placeholder="Haben-Konto" className={`col-span-5 px-3 py-2 bg-transparent border-b ${diagnose ? fieldColor(diagnose.habenOk) : "border-stone-300"} focus:border-[#1B6B63] text-sm`} value={entry.haben} onChange={(e) => onChange({ ...entry, haben: e.target.value })} disabled={locked} />
      <input type="text" placeholder="Betrag" className={`col-span-2 px-3 py-2 bg-transparent border-b ${diagnose ? fieldColor(diagnose.betragOk) : "border-stone-300"} focus:border-[#1B6B63] text-sm text-right`} value={entry.betrag} onChange={(e) => onChange({ ...entry, betrag: e.target.value })} disabled={locked} />
    </div>
  );
};

const FallCard = ({ fall, state, setState }) => {
  const anzahl = fall.anzahlBuchungen || 1;
  const entries = state.entries || Array.from({ length: anzahl }, () => ({ soll: "", haben: "", betrag: "" }));
  const [showSolution, setShowSolution] = useState(false);

  const updateEntry = (i, newEntry) => {
    const newEntries = [...entries];
    newEntries[i] = newEntry;
    setState({ ...state, entries: newEntries, checked: false, diagnosen: null });
  };

  const pruefen = () => {
    if (fall.freitext) {
      setShowSolution(true);
      setState({ ...state, checked: true, correct: true });
      return;
    }
    const isCorrect = (fall.loesungen || []).some((variante) => {
      if (variante.length !== entries.length) return false;
      const used = new Array(variante.length).fill(false);
      return entries.every((entry) => {
        for (let i = 0; i < variante.length; i++) {
          if (!used[i] && checkEntry(entry, [variante[i]])) { used[i] = true; return true; }
        }
        return false;
      });
    });
    const diagnosen = entries.map((entry) => diagnoseEntry(entry, (fall.loesungen || []).flat()));
    setState({ ...state, checked: true, correct: isCorrect, diagnosen });
  };

  const reset = () => {
    setState({ entries: Array.from({ length: anzahl }, () => ({ soll: "", haben: "", betrag: "" })), checked: false, correct: false, diagnosen: null });
    setShowSolution(false);
  };

  if (fall.keineEingabe) {
    return (
      <div className="bg-amber-50 border-l-4 border-[#F9E47A] rounded-md p-5 mb-4">
        <span className="text-xs font-semibold tracking-widest text-stone-500 uppercase">{fall.label}</span>
        <p className="text-stone-700 text-sm leading-relaxed mt-2">{fall.text}</p>
        {fall.loesung && <p className="text-stone-600 text-xs mt-3 italic">{fall.loesung}</p>}
      </div>
    );
  }

  return (
    <div className={`bg-white rounded-lg border ${state.checked ? (state.correct ? "border-emerald-400" : "border-rose-400") : "border-stone-200"} shadow-sm p-5 mb-4 transition-all`}>
      <div className="flex items-start justify-between mb-3">
        <div>
          <span className="text-xs font-semibold tracking-widest text-[#1B6B63] uppercase">{fall.label}</span>
          <p className="text-stone-800 text-sm leading-relaxed mt-1">{fall.text}</p>
        </div>
        {state.checked && (
          <div className={`ml-4 flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${state.correct ? "bg-emerald-500" : "bg-rose-500"}`}>
            {state.correct ? <CheckIcon className="w-5 h-5 text-white" /> : <XIcon className="w-5 h-5 text-white" />}
          </div>
        )}
      </div>
      {!fall.freitext && (
        <div className="space-y-2 mt-4">
          {entries.map((e, i) => (
            <BookingRow key={i} entry={e} onChange={(ne) => updateEntry(i, ne)} locked={state.checked && state.correct} status={state.checked ? (state.correct ? "correct" : "wrong") : null} diagnose={state.checked && !state.correct && state.diagnosen ? state.diagnosen[i] : null} />
          ))}
        </div>
      )}
      {state.checked && !state.correct && state.diagnosen && (
        <p className="text-xs text-rose-700 mt-2 italic">Rot markierte Felder sind falsch. Grün markierte sind korrekt.</p>
      )}
      <div className="flex flex-wrap gap-2 mt-4 no-print">
        {!state.correct && <button onClick={pruefen} className="px-4 py-2 bg-[#1B6B63] text-white text-sm font-medium rounded-md hover:bg-[#154f49] transition-colors">Prüfen</button>}
        {((state.checked && !state.correct) || showSolution) && (
          <button onClick={() => setShowSolution(!showSolution)} className="px-4 py-2 bg-stone-100 text-stone-700 text-sm font-medium rounded-md hover:bg-stone-200 transition-colors flex items-center gap-2">
            {showSolution ? <EyeOffIcon className="w-4 h-4" /> : <EyeIcon className="w-4 h-4" />}{showSolution ? "Lösung verbergen" : "Lösung zeigen"}
          </button>
        )}
        {state.checked && <button onClick={reset} className="px-4 py-2 bg-stone-100 text-stone-700 text-sm font-medium rounded-md hover:bg-stone-200 transition-colors flex items-center gap-2"><RotateCcwIcon className="w-4 h-4" />Zurücksetzen</button>}
      </div>
      {showSolution && (
        <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-md">
          <p className="text-xs font-semibold text-amber-900 uppercase tracking-widest mb-2">Musterlösung</p>
          {fall.freitext ? (
            <p className="text-sm text-stone-700">{fall.loesung}</p>
          ) : (
            <div className="space-y-1">
              {(fall.loesungen || [[]])[0].map((b, i) => (
                <div key={i} className="text-sm text-stone-700 font-mono">
                  <span className="font-semibold">{displayNames[b.sollKeys[0]] || b.sollKeys[0]}</span>
                  <span className="mx-2 text-stone-400">/</span>

                  <td className="px-3 py-2 text-right font-mono text-stone-700">{z.satz} %</td>
                  <td className="px-3 py-2">
                    <input type="text" inputMode="numeric" className={`w-32 px-2 py-1 border-2 rounded font-mono text-right text-sm ${ok ? "border-emerald-400 bg-emerald-50" : fail ? "border-rose-400 bg-rose-50" : "border-stone-300 bg-white"} focus:border-[#1B6B63]`} value={eingaben[i]} onChange={(e) => update(i, e.target.value)} disabled={state.correct} />
                  </td>
                </tr>
              );
            })}
            <tr className={`border-t-2 ${state.checked ? (state.totalOk ? "border-emerald-500 bg-emerald-50" : "border-rose-500 bg-rose-50") : "border-stone-300"}`}>
              <td className="px-3 py-2 font-bold text-stone-800" colSpan="2">Total differenzierte WB</td>
              <td className="px-3 py-2 text-right font-mono text-stone-700">100 %</td>
              <td className="px-3 py-2 text-right font-mono font-bold text-stone-900">{summe.toLocaleString("de-CH", { maximumFractionDigits: 0 })}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div className="flex flex-wrap gap-2 mt-4 no-print">
        {!state.correct && <button onClick={pruefen} className="px-4 py-2 bg-[#1B6B63] text-white text-sm font-medium rounded-md hover:bg-[#154f49] transition-colors">Prüfen</button>}
        {((state.checked && !state.correct) || showSolution) && (
          <button onClick={() => setShowSolution(!showSolution)} className="px-4 py-2 bg-stone-100 text-stone-700 text-sm font-medium rounded-md hover:bg-stone-200 transition-colors flex items-center gap-2">
            {showSolution ? <EyeOffIcon className="w-4 h-4" /> : <EyeIcon className="w-4 h-4" />}{showSolution ? "Lösung verbergen" : "Lösung zeigen"}
          </button>
        )}
        {state.checked && <button onClick={reset} className="px-4 py-2 bg-stone-100 text-stone-700 text-sm font-medium rounded-md hover:bg-stone-200 transition-colors flex items-center gap-2"><RotateCcwIcon className="w-4 h-4" />Zurücksetzen</button>}
      </div>
      {showSolution && (
        <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-md overflow-x-auto">
          <p className="text-xs font-semibold text-amber-900 uppercase tracking-widest mb-2">Musterlösung</p>
          <table className="w-full text-sm">
            <thead className="text-xs uppercase tracking-wider text-stone-600">
              <tr><th className="px-2 py-1 text-left">Klasse</th><th className="px-2 py-1 text-right">Berechnung</th><th className="px-2 py-1 text-right">WB</th></tr>
            </thead>
            <tbody>
              {fall.zeilen.map((z, i) => (
                <tr key={i} className="border-t border-amber-200">
                  <td className="px-2 py-1 text-stone-700">{z.klasse}</td>
                  <td className="px-2 py-1 text-right font-mono text-stone-700">{z.betrag.toLocaleString("de-CH")} × {z.satz} %</td>
                  <td className="px-2 py-1 text-right font-mono font-bold text-[#1B6B63]">{z.erwartet.toLocaleString("de-CH")}</td>
                </tr>
              ))}
              <tr className="border-t-2 border-amber-400">
                <td className="px-2 py-1 font-bold" colSpan="2">Total</td>
                <td className="px-2 py-1 text-right font-mono font-bold text-[#1B6B63]">{fall.erwartetTotal.toLocaleString("de-CH")}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// Interpretations-Karte (Reflexion mit aufdeckbarer Musterlösung)
const InterpretationCard = ({ fall, state, setState }) => {
  const [showSolution, setShowSolution] = useState(state?.correct || false);
  const aufdecken = () => {
    setShowSolution(true);
    setState({ ...state, correct: true });
  };
  const reset = () => {
    setShowSolution(false);
    setState({ correct: false });
  };

  return (
    <div className={`bg-white rounded-lg border ${state.correct ? "border-emerald-400" : "border-stone-200"} shadow-sm p-5 mb-4 transition-all`}>
      <div className="flex items-start justify-between mb-3">
        <div className="flex-1">
          <span className="text-xs font-semibold tracking-widest text-[#1B6B63] uppercase">{fall.label}</span>
          <p className="text-stone-800 text-sm leading-relaxed mt-1">{fall.text}</p>
        </div>
        {state.correct && (
          <div className="ml-4 flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-emerald-500">
            <CheckIcon className="w-5 h-5 text-white" />
          </div>
        )}
      </div>
      <p className="text-xs text-stone-500 italic mt-2">Tipp: Notiere deine Antwort auf Papier oder im Notizfeld. Decke danach die Musterlösung auf, um zu vergleichen.</p>
      <div className="flex flex-wrap gap-2 mt-4 no-print">
        {!showSolution && <button onClick={aufdecken} className="px-4 py-2 bg-[#1B6B63] text-white text-sm font-medium rounded-md hover:bg-[#154f49] transition-colors flex items-center gap-2"><EyeIcon className="w-4 h-4" />Musterlösung aufdecken</button>}
        {showSolution && <button onClick={reset} className="px-4 py-2 bg-stone-100 text-stone-700 text-sm font-medium rounded-md hover:bg-stone-200 transition-colors flex items-center gap-2"><RotateCcwIcon className="w-4 h-4" />Verbergen</button>}
      </div>
      {showSolution && (
        <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-md">
          <p className="text-xs font-semibold text-amber-900 uppercase tracking-widest mb-2">Musterlösung</p>
          <ul className="space-y-2">
            {fall.musterloesung.map((m, i) => (
              <li key={i} className="text-sm text-stone-700 flex gap-2">
                <span className="text-[#1B6B63] font-bold flex-shrink-0">•</span>
                <span>{m}</span>
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
};

// Abschnitts-Trenner für Aufgabe 6
const AbschnittsTrenner = ({ label }) => (
  <div className="my-6 flex items-center gap-3">
    <div className="flex-1 h-px bg-stone-300"></div>
    <span className="font-serif text-lg text-[#1B6B63] font-semibold whitespace-nowrap">{label}</span>
    <div className="flex-1 h-px bg-stone-300"></div>
  </div>
);

// Sachverhalt-Box (für Aufgabe 6)
const SachverhaltBox = ({ daten }) => {
  const [open, setOpen] = useState(true);
  return (
    <div className="bg-white border border-stone-200 rounded-lg shadow-sm mb-6 overflow-hidden">
      <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-5 py-3 bg-stone-50 hover:bg-stone-100 transition-colors no-print">
        <span className="font-serif text-base font-semibold text-stone-800 flex items-center gap-2"><InfoIcon className="w-4 h-4 text-[#1B6B63]" />Sachverhalt &amp; Daten</span>
        <span className="text-stone-500 text-xs">{open ? "Verbergen" : "Anzeigen"}</span>
      </button>
      {open && (
        <div className="p-5 space-y-5">
          <div>
            <h4 className="text-xs font-semibold tracking-widest uppercase text-stone-600 mb-2">Kennzahlen Vorjahr / Aktuell</h4>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-stone-50 text-xs uppercase tracking-wider text-stone-600">
                  <tr>{daten.kennzahlen.cols.map((c, i) => <th key={i} className={`px-3 py-2 ${i === 0 ? "text-left" : "text-right"}`}>{c}</th>)}</tr>
                </thead>
                <tbody>
                  {daten.kennzahlen.rows.map((r, i) => (
                    <tr key={i} className="border-t border-stone-100">
                      {r.map((c, j) => <td key={j} className={`px-3 py-2 ${j === 0 ? "text-stone-700" : "text-right font-mono text-stone-800"}`}>{c}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div>
            <h4 className="text-xs font-semibold tracking-widest uppercase text-stone-600 mb-2">{daten.altersstruktur.title}</h4>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-stone-50 text-xs uppercase tracking-wider text-stone-600">
                  <tr>{daten.altersstruktur.cols.map((c, i) => <th key={i} className={`px-3 py-2 ${i === 0 ? "text-left" : "text-right"}`}>{c}</th>)}</tr>
                </thead>
                <tbody>
                  {daten.altersstruktur.rows.map((r, i) => (
                    <tr key={i} className={`border-t border-stone-100 ${i === daten.altersstruktur.rows.length - 1 ? "font-bold bg-stone-50" : ""}`}>
                      {r.map((c, j) => <td key={j} className={`px-3 py-2 ${j === 0 ? "text-stone-700" : "text-right font-mono text-stone-800"}`}>{c}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// Vergleichstabelle Käufer vs. Verkäufer (Aufgabe 5)
const VergleichsAnzeige = ({ daten }) => {
  const [sichtbar, setSichtbar] = useState(false);
  if (!sichtbar) {
    return (
      <div className="bg-stone-50 rounded-lg p-6 border border-stone-200 mb-4">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h3 className="font-serif text-lg text-stone-800">{daten.title}</h3>
            <p className="text-sm text-stone-600 mt-1">{daten.subtitle}</p>
          </div>
          <button onClick={() => setSichtbar(true)} className="px-4 py-2 bg-[#1B6B63] text-white text-sm font-medium rounded-md hover:bg-[#154f49] transition-colors flex items-center gap-2"><EyeIcon className="w-4 h-4" />Vergleich einblenden</button>
        </div>
      </div>
    );
  }
  return (
    <div className="bg-white rounded-lg border border-stone-200 p-6 mb-4">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <div>
          <h3 className="font-serif text-lg text-stone-800">{daten.title}</h3>
          <p className="text-sm text-stone-600 mt-1">{daten.subtitle}</p>
        </div>
        <button onClick={() => setSichtbar(false)} className="text-sm text-stone-500 hover:text-stone-700 flex items-center gap-1 no-print"><EyeOffIcon className="w-4 h-4" />Verbergen</button>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm border-collapse">
          <thead>
            <tr>
              <th className="bg-stone-100 px-3 py-2 text-left text-xs font-semibold uppercase tracking-wider text-stone-600 border border-stone-200">{daten.cols[0]}</th>
              <th className="bg-blue-50 px-3 py-2 text-left text-xs font-semibold uppercase tracking-wider text-blue-900 border border-stone-200">{daten.cols[1]}</th>
              <th className="bg-amber-50 px-3 py-2 text-left text-xs font-semibold uppercase tracking-wider text-amber-900 border border-stone-200">{daten.cols[2]}</th>
            </tr>
          </thead>
          <tbody>
            {daten.rows.map((row, i) => (
              <tr key={i}>
                <td className="px-3 py-2 font-semibold text-stone-700 bg-stone-50 border border-stone-200">{row[0]}</td>
                <td className="px-3 py-2 text-stone-700 border border-stone-200">{row[1]}</td>
                <td className="px-3 py-2 text-stone-700 border border-stone-200">{row[2]}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="mt-4 p-3 bg-amber-50 border-l-4 border-[#F9E47A] rounded-md text-xs text-stone-700">
        <strong>Merksatz:</strong> Geleistete Anzahlungen (Käufer) sind <em>aktiv</em>, erhaltene Anzahlungen (Verkäufer) sind <em>passiv</em>. Beim Käufer wird die Anzahlung später in den Vermögenswert umgebucht, beim Verkäufer in den Betriebsertrag realisiert.
      </div>
    </div>
  );
};

// Karten-Router
const RenderCard = ({ fall, state, setState }) => {
  if (fall.typ === "abschnitt") return <AbschnittsTrenner label={fall.label} />;
  if (fall.typ === "kennzahl") return <KennzahlCard fall={fall} state={state} setState={setState} />;
  if (fall.typ === "wbtabelle") return <WBTabelleCard fall={fall} state={state} setState={setState} />;
  if (fall.typ === "interpretation") return <InterpretationCard fall={fall} state={state} setState={setState} />;
  return <FallCard fall={fall} state={state} setState={setState} />;
};

// Kontenführung-Anzeige (Aufgabe 1)
const KontenAnzeige = ({ daten }) => {
  const [sichtbar, setSichtbar] = useState(false);
  if (!sichtbar) {
    return (
      <div className="bg-stone-50 rounded-lg p-6 border border-stone-200 mb-4">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h3 className="font-serif text-lg text-stone-800">Teil B: Kontenführung</h3>
            <p className="text-sm text-stone-600 mt-1">Forderungen L+L, WB Forderungen L+L, Verluste aus Forderungen über beide Jahre.</p>
          </div>
          <button onClick={() => setSichtbar(true)} className="px-4 py-2 bg-[#1B6B63] text-white text-sm font-medium rounded-md hover:bg-[#154f49] transition-colors flex items-center gap-2"><EyeIcon className="w-4 h-4" />Konten einblenden</button>
        </div>
      </div>
    );
  }
  return (
    <div className="bg-white rounded-lg border border-stone-200 p-6 mb-4">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-serif text-lg text-stone-800">Teil B: Kontenführung (Lösung)</h3>
        <button onClick={() => setSichtbar(false)} className="text-sm text-stone-500 hover:text-stone-700 flex items-center gap-1 no-print"><EyeOffIcon className="w-4 h-4" />Verbergen</button>
      </div>
      <div className="space-y-6">
        {daten.konten.map((konto, i) => (
          <div key={i}>
            <h4 className="font-semibold text-[#1B6B63] mb-2">{konto.name}</h4>
            <div className="grid md:grid-cols-2 gap-4">
              {["jahr1", "jahr2"].map((j) => (
                <div key={j} className="border border-stone-200 rounded">
                  <div className="bg-stone-100 px-3 py-1 text-xs font-semibold uppercase tracking-widest text-stone-600 text-center">{j === "jahr1" ? "Jahr 1" : "Jahr 2"}</div>
                  <div className="grid grid-cols-2 text-xs">
                    <div className="border-r border-stone-200">
                      <div className="bg-stone-50 px-2 py-1 font-semibold text-stone-600 text-center">Soll</div>
                      {konto[j].soll.map((e, k) => (
                        <div key={k} className="px-2 py-1 flex justify-between border-t border-stone-100">
                          <span className="text-stone-700">{e[0]}</span>
                          <span className="font-mono text-stone-800">{e[1].toLocaleString("de-CH")}</span>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div className="bg-stone-50 px-2 py-1 font-semibold text-stone-600 text-center">Haben</div>
                      {konto[j].haben.map((e, k) => (
                        <div key={k} className="px-2 py-1 flex justify-between border-t border-stone-100">
                          <span className="text-stone-700">{e[0]}</span>
                          <span className="font-mono text-stone-800">{e[1].toLocaleString("de-CH")}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// Hilfsfunktion: zählt nur "echte" Fälle (keine Abschnittstrenner, keine reinen Infotexte)
const istZaehlbar = (f) => !f.keineEingabe && f.typ !== "abschnitt" && f.typ !== "info";

function App() {
  const [activeTab, setActiveTab] = useState(0);
  const [states, setStates] = useState({});

  const setFallState = (id, newState) => setStates((s) => ({ ...s, [id]: newState }));
  const getFallState = (id) => states[id] || { entries: null, checked: false, correct: false };

  const stats = useMemo(() => {
    let total = 0, correct = 0;
    alleAufgaben.forEach((a) => a.faelle.forEach((f) => {
      if (!istZaehlbar(f)) return;
      total++;
      if (states[f.id]?.correct) correct++;
    }));
    return { total, correct, prozent: total > 0 ? Math.round((correct / total) * 100) : 0 };
  }, [states]);

  const aktuelleAufgabe = alleAufgaben[activeTab];

  return (
    <div className="min-h-screen bg-stone-50">
      <div className="bg-[#1B6B63] text-white">
        <div className="max-w-5xl mx-auto px-6 py-8">
          <div className="flex items-center justify-between flex-wrap gap-4">
            <div>
              <p className="text-xs tracking-widest uppercase text-[#F9E47A] mb-1">Finanzielles Rechnungswesen I · HFW</p>
              <h1 className="font-serif text-3xl md:text-4xl font-bold">Block 2 · Übungsplattform</h1>
              <p className="text-sm text-stone-200 mt-2">Kundenforderungen, Wertberichtigungen, Anzahlungen, Kundenanalyse</p>
            </div>
            <div className="flex items-center gap-3 bg-white/10 rounded-lg px-5 py-3">
              <AwardIcon className="w-6 h-6 text-[#F9E47A]" />
              <div>
                <p className="text-xs text-stone-200">Fortschritt</p>
                <p className="font-mono text-lg font-bold">{stats.correct} / {stats.total} <span className="text-[#F9E47A]">({stats.prozent}%)</span></p>
              </div>
            </div>
          </div>
          <div className="w-full bg-white/10 rounded-full h-2 mt-4 overflow-hidden">
            <div className="bg-[#F9E47A] h-2 rounded-full transition-all duration-500" style={{ width: `${stats.prozent}%` }} />
          </div>
        </div>
      </div>

      <div className="bg-white border-b border-stone-200 sticky top-0 z-10 no-print">
        <div className="max-w-5xl mx-auto px-6">
          <div className="flex overflow-x-auto">
            {alleAufgaben.map((a, i) => {
              const gesamt = a.faelle.filter(istZaehlbar).length;
              const geloest = a.faelle.filter((f) => istZaehlbar(f) && states[f.id]?.correct).length;
              return (
                <button key={i} onClick={() => setActiveTab(i)} className={`px-5 py-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === i ? "border-[#1B6B63] text-[#1B6B63]" : "border-transparent text-stone-500 hover:text-stone-800"}`}>
                  <span className="block text-xs tracking-widest uppercase">{a.tabLabel}</span>
                  <span className="block mt-1">{geloest}/{gesamt}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-8">
        <div className="mb-6">
          <h2 className="font-serif text-2xl text-stone-800">{aktuelleAufgabe.title}</h2>
          <p className="text-stone-600 text-sm mt-1">{aktuelleAufgabe.subtitle}</p>
          {aktuelleAufgabe.context && <p className="text-stone-700 text-sm mt-3 leading-relaxed bg-stone-50 border-l-4 border-stone-300 px-4 py-3 rounded">{aktuelleAufgabe.context}</p>}
        </div>

        {aktuelleAufgabe.sachverhalt && <SachverhaltBox daten={aktuelleAufgabe.sachverhalt} />}

        <div className="bg-amber-50 border-l-4 border-[#F9E47A] rounded-md p-4 mb-6">
          <div className="flex gap-3">
            <BookOpenIcon className="w-5 h-5 text-[#1B6B63] flex-shrink-0 mt-0.5" />
            <div className="text-sm text-stone-700">
              <p className="font-semibold mb-1">So funktioniert es</p>
              <p>Buchungen: Soll, Haben und Betrag eingeben (alternative Schreibweisen wie Debitoren, Kreditoren, Warenertrag werden akzeptiert). Kennzahlen: Wert eintippen, ±Toleranz wird berücksichtigt. Reflexionsfragen: Antwort selbst notieren, dann Musterlösung aufdecken.</p>
            </div>
          </div>
        </div>

        {aktuelleAufgabe.faelle.map((fall) => (
          <RenderCard key={fall.id} fall={fall} state={getFallState(fall.id)} setState={(ns) => setFallState(fall.id, ns)} />
        ))}

        {aktuelleAufgabe.kontenLoesung && <KontenAnzeige daten={aktuelleAufgabe.kontenLoesung} />}
        {aktuelleAufgabe.vergleich && <VergleichsAnzeige daten={aktuelleAufgabe.vergleich} />}

        <div className="flex justify-between mt-8 pt-6 border-t border-stone-200 no-print">
          <button onClick={() => setActiveTab(Math.max(0, activeTab - 1))} disabled={activeTab === 0} className="px-4 py-2 text-sm font-medium text-stone-700 hover:text-[#1B6B63] disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2"><ChevronLeftIcon className="w-4 h-4" />Vorherige Aufgabe</button>
          <button onClick={() => setActiveTab(Math.min(alleAufgaben.length - 1, activeTab + 1))} disabled={activeTab === alleAufgaben.length - 1} className="px-4 py-2 text-sm font-medium text-stone-700 hover:text-[#1B6B63] disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">Nächste Aufgabe<ChevronRightIcon className="w-4 h-4" /></button>
        </div>
      </div>

      <div className="bg-stone-100 border-t border-stone-200 py-6 mt-12">
        <div className="max-w-5xl mx-auto px-6 text-center">
          <p className="text-xs text-stone-500">finanzunterricht.ch · Davide Bianchini · Bildungszentrum für Wirtschaft Weinfelden</p>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
